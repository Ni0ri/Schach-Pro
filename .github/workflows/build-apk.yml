name: Build Schach Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Show Java Home
        run: echo "JAVA_HOME=$JAVA_HOME"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev lld

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install 'buildozer>=1.5.0' 'cython>=0.29.36,<3.0.0'
          buildozer version

      - name: Create Icon
        run: |
          python3 -c "
          import struct, zlib
          def mk(path, size):
              sq=size//8; L=(240,233,197); D=(74,124,89); px=[]
              for y in range(size):
                  row=[0]
                  for x in range(size):
                      c=L if (x//sq+y//sq)%2==0 else D; row.extend(c)
                  px.append(bytes(row))
              raw=b''.join(px)
              def ch(ct,d):
                  c=ct+d; return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
              ihdr=struct.pack('>IIBBBBB',size,size,8,2,0,0,0)
              with open(path,'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n'); f.write(ch(b'IHDR',ihdr)); f.write(ch(b'IDAT',zlib.compress(raw))); f.write(ch(b'IEND',b''))
          mk('icon.png',192); mk('presplash.png',512); print('Icons OK')
          "

      - name: Verify Files
        run: |
          echo "=== Dateien im Repo ==="
          ls -la
          echo ""
          echo "=== main.py vorhanden ==="
          head -5 main.py
          echo ""
          echo "=== buildozer.spec vorhanden ==="
          head -5 buildozer.spec

      - name: Build APK
        run: |
          set -e
          yes | buildozer android debug 2>&1 | tee build.log
          echo ""
          echo "=== Build fertig ==="
          ls -la bin/ 2>/dev/null || echo "FEHLER: bin/ Ordner nicht erstellt"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Schach-Pro-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
